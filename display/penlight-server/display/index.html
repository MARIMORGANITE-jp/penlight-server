<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Fks Penlight</title>

<style>

body {
    margin: 0;
    height: 100vh;
    background: black;
    overflow: hidden;

    display: flex;
    justify-content: space-between;
    align-items: center;

    touch-action: none;
    transition: background 0.15s linear;
}

/* ペンライト画像 */
#penlight {
    position: absolute;

    width: 40%;

    left: 50%;
    transform: translateX(-50%);

    pointer-events: none;
}

/* 左右ボタン */
.sideButton {

    width: 25%;
    height: 100%;

    border: none;

    background: rgba(255,255,255,0.08);

    color: white;

    font-size: 32px;
}

/* モード切替ボタン */
#modeBtn {

    position: absolute;

    top: 12px;
    left: 12px;

    padding: 10px 14px;

    border: none;
    border-radius: 10px;

    background: rgba(0,0,0,0.5);

    color: white;

    font-size: 14px;

    z-index: 10;

    transition: all 0.2s ease;
}

/* ライブモード時 */
.liveActive {

    background: rgba(255, 80, 80, 0.9) !important;

    box-shadow:
        0 0 10px rgba(255,80,80,0.8),
        0 0 25px rgba(255,80,80,0.7),
        0 0 45px rgba(255,80,80,0.6);

    color: white;

    animation: pulse 1s infinite;
}

/* 発光アニメーション */
@keyframes pulse {

    0% {
        transform: scale(1);
    }

    50% {
        transform: scale(1.05);
    }

    100% {
        transform: scale(1);
    }
}

</style>
</head>

<body>

<button class="sideButton" onclick="prevColor()">◀</button>

<button class="sideButton" onclick="nextColor()">▶</button>

<button id="modeBtn" onclick="toggleMode()">
通常モード
</button>

<img id="penlight" src="FksPenlight_WT.png">

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const socket = io("http://192.168.11.13:3000");

const colors = [

    "#ff0000",
    "#ff7b00",
    "#ffff00",
    "#00ff00",
    "#00ffff",
    "#0000ff",
    "#8000ff",
    "#ff00ff",
    "#ffffff"

];

let index = 0;

let selfColor = colors[0];

let liveColor = colors[0];

let isLiveMode = false;

let blinkInterval = null;

let rainbowInterval = null;

let isBlinkOn = true;

let rainbowHue = 0;


// =========================
// 色適用
// =========================
function applyColor(color) {

    document.body.style.background = color;
}


// =========================
// 通常モード
// =========================
function updateSelfColor() {

    selfColor = colors[index];

    applyColor(selfColor);
}

function nextColor() {

    if (isLiveMode) return;

    index = (index + 1) % colors.length;

    updateSelfColor();

    navigator.vibrate?.(20);
}

function prevColor() {

    if (isLiveMode) return;

    index = (index - 1 + colors.length) % colors.length;

    updateSelfColor();

    navigator.vibrate?.(20);
}


// =========================
// スワイプ
// =========================
let startX = 0;

document.addEventListener("touchstart", (e) => {

    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", (e) => {

    if (isLiveMode) return;

    const endX = e.changedTouches[0].clientX;

    const diff = endX - startX;

    if (Math.abs(diff) < 50) return;

    if (diff > 0) {

        prevColor();

    } else {

        nextColor();
    }
});


// =========================
// モード切替
// =========================
function toggleMode() {

    isLiveMode = !isLiveMode;

    const btn = document.getElementById("modeBtn");

    if (isLiveMode) {

        btn.textContent = "ライブモード";

        btn.classList.add("liveActive");

        applyColor(liveColor);

    } else {

        btn.textContent = "通常モード";

        btn.classList.remove("liveActive");

        stopBlink();

        stopRainbow();

        applyColor(selfColor);
    }

    navigator.vibrate?.(40);
}


// =========================
// Socket 色変更
// =========================
socket.on("changeColor", (color) => {

    liveColor = color;

    if (!isLiveMode) return;

    if (!blinkInterval && !rainbowInterval) {

        applyColor(liveColor);
    }
});


// =========================
// Socket モード変更
// =========================
socket.on("mode", (mode) => {

    if (!isLiveMode) return;

    stopBlink();

    stopRainbow();

    if (mode === "blink") {

        startBlink();

    } else if (mode === "rainbow") {

        startRainbow();

    } else {

        applyColor(liveColor);
    }
});


// =========================
// 点滅
// =========================
function startBlink() {

    stopBlink();

    isBlinkOn = true;

    blinkInterval = setInterval(() => {

        applyColor(
            isBlinkOn ? liveColor : "black"
        );

        isBlinkOn = !isBlinkOn;

    }, 300);
}

function stopBlink() {

    if (blinkInterval) {

        clearInterval(blinkInterval);

        blinkInterval = null;
    }
}


// =========================
// 虹待機
// =========================
function startRainbow() {

    stopRainbow();

    rainbowInterval = setInterval(() => {

        rainbowHue = (rainbowHue + 1) % 360;

        applyColor(
            `hsl(${rainbowHue}, 100%, 35%)`
        );

    }, 40);
}

function stopRainbow() {

    if (rainbowInterval) {

        clearInterval(rainbowInterval);

        rainbowInterval = null;
    }
}


// =========================
// 初期表示
// =========================
updateSelfColor();

</script>

</body>
</html>
